name: CI Build

on:
  push:
    branches: [ master, main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dotnet-version: '8.0.x'
            target-framework: 'net8.0'
          - dotnet-version: '10.0.x'
            target-framework: 'net10.0'
    permissions:
      packages: write
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Install both .NET 10 SDK (always required — library and test projects include net10.0
    # in their <TargetFrameworks>, so restore needs the net10 targeting pack regardless of the
    # matrix entry) and the matrix-specific SDK (needed to actually run net8.0 tests).
    # setup-dotnet@v4 layers SDKs without removing existing ones.
    - name: Setup .NET SDKs (10 LTS + matrix runtime)
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          10.0.x
          ${{ matrix.dotnet-version }}

    - name: Add Voyager Source
      run: dotnet nuget add source "https://nuget.pkg.github.com/Voyager-Poland/index.json" -n Voyager-Poland -u ${{secrets.VOY_ACTIONLOGIN}} -p ${{secrets.VOY_ACTIONLOGINPASS}} --store-password-in-clear-text

    - name: Restore dependencies
      run: dotnet restore

    # Build only the test projects for the current matrix TFM (library projects build transitively
    # via project references, picking the compatible TFM: netstandard2.0 for net8.0 consumer,
    # net10.0 for net10.0 consumer). This avoids attempting to compile net48 on Linux — net48
    # binary verification runs on the dedicated test-net48 job below.
    - name: Build (matrix target only)
      env:
        TARGET_FRAMEWORK: ${{ matrix.target-framework }}
      run: |
        dotnet build --no-restore -c Release -f $TARGET_FRAMEWORK src/Voyager.Common.Results.Tests/Voyager.Common.Results.Tests.csproj
        dotnet build --no-restore -c Release -f $TARGET_FRAMEWORK src/Voyager.Common.Resilience.Tests/Voyager.Common.Resilience.Tests.csproj
        # Analyzer tests are net8.0-only (Microsoft.CodeAnalysis.Testing pinned to net8.0)
        if [ "$TARGET_FRAMEWORK" = "net8.0" ]; then
          dotnet build --no-restore -c Release -f net8.0 src/Voyager.Common.Results.Analyzers.Tests/Voyager.Common.Results.Analyzers.Tests.csproj
        fi
        # Build the main library projects too — needed for `dotnet pack` in the tag-gated step below
        dotnet build --no-restore -c Release src/Voyager.Common.Results/Voyager.Common.Results.csproj
        dotnet build --no-restore -c Release src/Voyager.Common.Resilience/Voyager.Common.Resilience.csproj

    - name: Test (matrix target only)
      env:
        TARGET_FRAMEWORK: ${{ matrix.target-framework }}
      run: |
        dotnet test --no-build --verbosity normal -c Release -f $TARGET_FRAMEWORK --collect:"XPlat Code Coverage" src/Voyager.Common.Results.Tests/Voyager.Common.Results.Tests.csproj
        dotnet test --no-build --verbosity normal -c Release -f $TARGET_FRAMEWORK --collect:"XPlat Code Coverage" src/Voyager.Common.Resilience.Tests/Voyager.Common.Resilience.Tests.csproj
        if [ "$TARGET_FRAMEWORK" = "net8.0" ]; then
          dotnet test --no-build --verbosity normal -c Release -f net8.0 --collect:"XPlat Code Coverage" src/Voyager.Common.Results.Analyzers.Tests/Voyager.Common.Results.Analyzers.Tests.csproj
        fi

    - name: Upload coverage reports
      uses: codecov/codecov-action@v5
      if: success() && github.event.repository.visibility == 'public'
      with:
        files: '**/coverage.cobertura.xml'
        slug: Voyager-Poland/Voyager.Common.Results
        fail_ci_if_error: false

    - name: Pack (only on dotnet 10 LTS, only on tag)
      if: matrix.target-framework == 'net10.0' && startsWith(github.ref, 'refs/tags/v')
      run: |
        dotnet pack --no-restore --no-build -c Release src/Voyager.Common.Results/Voyager.Common.Results.csproj
        dotnet pack --no-restore --no-build -c Release src/Voyager.Common.Resilience/Voyager.Common.Resilience.csproj

    - name: Upload artifacts (only on dotnet 10 LTS, only on tag)
      if: matrix.target-framework == 'net10.0' && startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: packages
        path: src/**/bin/Release/*.nupkg
        compression-level: 0
        retention-days: 1
        overwrite: true

  test-net48:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET 10 SDK (for tooling)
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Add Voyager Source
      run: dotnet nuget add source "https://nuget.pkg.github.com/Voyager-Poland/index.json" -n Voyager-Poland -u ${{secrets.VOY_ACTIONLOGIN}} -p ${{secrets.VOY_ACTIONLOGINPASS}} --store-password-in-clear-text

    - name: Restore dependencies
      run: dotnet restore

    - name: Build net48 (test-only — main library targets netstandard2.0;net10.0; this job verifies binary compatibility on .NET Framework 4.8)
      run: |
        dotnet build --no-restore -c Release -f netstandard2.0 src/Voyager.Common.Results/Voyager.Common.Results.csproj
        dotnet build --no-restore -c Release -f netstandard2.0 src/Voyager.Common.Resilience/Voyager.Common.Resilience.csproj
        dotnet build --no-restore -c Release -f net48 src/Voyager.Common.Results.Tests/Voyager.Common.Results.Tests.csproj
        dotnet build --no-restore -c Release -f net48 src/Voyager.Common.Resilience.Tests/Voyager.Common.Resilience.Tests.csproj

    - name: Test net48 (no coverage)
      run: |
        dotnet test --no-build -c Release -f net48 src/Voyager.Common.Results.Tests/Voyager.Common.Results.Tests.csproj
        dotnet test --no-build -c Release -f net48 src/Voyager.Common.Resilience.Tests/Voyager.Common.Resilience.Tests.csproj

  deploy:
    runs-on: ubuntu-latest
    needs: [build, test-net48]
    # Only deploy on tag push (per ADR-0014 — branch pushes no longer trigger publishing)
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      packages: write
      contents: read

    steps:
      - name: Add Voyager Source
        run: dotnet nuget add source "https://nuget.pkg.github.com/Voyager-Poland/index.json" -n Voyager-Poland -u ${{secrets.VOY_ACTIONLOGIN}} -p ${{secrets.VOY_ACTIONLOGINPASS}} --store-password-in-clear-text

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages

      - name: Publish to GitHub Packages
        run: dotnet nuget push **/*.nupkg -s Voyager-Poland --skip-duplicate

      - name: Publish to NuGet.org
        if: github.event.repository.visibility == 'public'
        run: dotnet nuget push **/*.nupkg --api-key ${{secrets.VOY_AND_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate

  release:
    runs-on: ubuntu-latest
    needs: [build, test-net48]
    # Only create release on tags
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: '**/*.nupkg'
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'preview') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
